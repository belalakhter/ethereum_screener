{{block "index" .}}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>EthScan</title>
        <link rel="stylesheet" href="/static/style.css" />
        <script
            src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.5/dist/htmx.min.js"
            integrity="sha384-t4DxZSyQK+0Uv4jzy5B0QyHyWQD2GFURUmxKMBVww9+e2EJ0ei/vCvv7+79z0fkr"
            crossorigin="anonymous"
        ></script>
        <script src="https://cdn.tailwindcss.com"></script>
        <script
            src="https://unpkg.com/lightweight-charts@5.1.0/dist/lightweight-charts.standalone.production.js"
            defer
        ></script>
        <script src="/static/script.js?v=history-candles-4" defer></script>
    </head>
    <body
        class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-slate-900 text-white font-sans"
    >
        <header class="fixed top-0 left-0 w-full flex-col">
            <h1
                id="header"
                class="flex items-center px-4 py-4 text-3xl font-bold text-red-600"
            >
                <img src="/static/assets/eth.png" class="h-8 w-8 mr-2" />

                EthScan
            </h1>
            <div
                class="max-w-6xl mx-auto w-full flex flex-col items-center justify-center px-4 py-6"
            >
                <form
                    data-pair-search-form
                    class="w-1/2 flex items-center bg-blue-800 rounded-md px-2 border border-white/70"
                    hx-post="/metadata"
                    hx-target="#result"
                    hx-swap="innerHTML"
                >
                    <input
                        id="pairInput"
                        type="text"
                        name="pair"
                        placeholder="Token or Uniswap V2 Pair Address"
                        value="{{ .DefaultPair }}"
                        class="w-full bg-blue-800 text-white placeholder-gray-400 px-3 py-2 focus:outline-none rounded-l-md"
                    />
                    <button
                        type="submit"
                        class="px-3 text-white"
                    >
                        <svg
                            class="h-5 w-5 text-cyan-300"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M21 21l-4.35-4.35M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16z"
                            />
                        </svg>
                    </button>
                </form>
                <p class="mt-3 mb-4 text-sm text-blue-100/85">
                    Connected network: {{ .Network }}. Token input auto-resolves to wrapped-native Uniswap V2-style pools on this chain.
                </p>
            </div>
        </header>
        <div id="result">{{ template "metadata" .Metadata }}</div>
        <script>
            const header = document.getElementById("header");

            window.addEventListener("scroll", () => {
                if (window.scrollY > 0) {
                    header.classList.add(
                        "border-b-2",
                        "border-blue-700",
                        "bg-blue-800",
                        "shadow-md",
                    );
                } else {
                    header.classList.remove(
                        "border-b-2",
                        "border-blue-700",
                        "bg-blue-800",
                        "shadow-md",
                    );
                }
            });
        </script>
    </body>
</html>
{{end}}
